                <rect x="18" y="16" width="100" height="26" rx="13" fill="#dcfce7" />
                <text x="32" y="34" class="chip">Slide 02</text>
                <text x="20" y="82" class="label">wsl-dev-toolkit</text>
                <text x="20" y="112" class="desc">Reusable WSL2 Ubuntu CLI toolkit with one...</text>
