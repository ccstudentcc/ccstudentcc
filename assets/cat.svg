<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bde0fe"/>
      <stop offset="100%" stop-color="#e9f5ff"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e07a5f"/>
      <stop offset="100%" stop-color="#c1440e"/>
    </linearGradient>
    <!-- Cloud animation -->
    <style>
      /* ── overall scene cycling ── */
      /* total cycle = 30 s
         0-10 s : walking  (translateX animation + leg swing)
        10-18 s : playing  (paw batting + tail whip)
        18-28 s : sleeping (curl + zzz)
        28-30 s : fade back to start position
      */

      /* ── Walking phase: move cat 0→280px then back ── */
      @keyframes walkPos {
        0%         { transform: translateX(0px); }
        3.33%      { transform: translateX(60px); }
        6.67%      { transform: translateX(120px); }
        10%        { transform: translateX(200px); }
        13.33%     { transform: translateX(120px); }
        16.67%     { transform: translateX(60px); }
        20%        { transform: translateX(0px); }
        100%       { transform: translateX(0px); }
      }

      /* ── Leg swing (alternating, active only during walk) ── */
      @keyframes legFront {
        0%    { transform-origin: 50% 0%; transform: rotate(0deg); }
        5%    { transform-origin: 50% 0%; transform: rotate(20deg); }
        10%   { transform-origin: 50% 0%; transform: rotate(0deg); }
        15%   { transform-origin: 50% 0%; transform: rotate(-20deg); }
        20%   { transform-origin: 50% 0%; transform: rotate(0deg); }
        100%  { transform-origin: 50% 0%; transform: rotate(0deg); }
      }
      @keyframes legBack {
        0%    { transform-origin: 50% 0%; transform: rotate(0deg); }
        5%    { transform-origin: 50% 0%; transform: rotate(-20deg); }
        10%   { transform-origin: 50% 0%; transform: rotate(0deg); }
        15%   { transform-origin: 50% 0%; transform: rotate(20deg); }
        20%   { transform-origin: 50% 0%; transform: rotate(0deg); }
        100%  { transform-origin: 50% 0%; transform: rotate(0deg); }
      }

      /* ── Body bob during walk ── */
      @keyframes bodyBob {
        0%,100% { transform: translateY(0px); }
        5%      { transform: translateY(-3px); }
        10%     { transform: translateY(0px); }
        15%     { transform: translateY(-3px); }
        20%     { transform: translateY(0px); }
      }

      /* ── Tail wag (always) ── */
      @keyframes tailWag {
        0%,100% { transform-origin: 0% 50%; transform: rotate(-15deg); }
        25%     { transform-origin: 0% 50%; transform: rotate(15deg); }
        50%     { transform-origin: 0% 50%; transform: rotate(-15deg); }
        75%     { transform-origin: 0% 50%; transform: rotate(15deg); }
      }

      /* ── Play phase: paw batting ── */
      @keyframes pawBat {
        0%,39%  { transform-origin: 50% 0%; transform: rotate(0deg); opacity:0; }
        40%     { transform-origin: 50% 0%; transform: rotate(0deg); opacity:1; }
        45%     { transform-origin: 50% 0%; transform: rotate(-40deg); opacity:1; }
        50%     { transform-origin: 50% 0%; transform: rotate(0deg); opacity:1; }
        55%     { transform-origin: 50% 0%; transform: rotate(-40deg); opacity:1; }
        60%     { transform-origin: 50% 0%; transform: rotate(0deg); opacity:1; }
        61%,100%{ transform-origin: 50% 0%; transform: rotate(0deg); opacity:0; }
      }

      /* ── Ball bounce during play ── */
      @keyframes ballBounce {
        0%,39%  { transform: translate(0px,0px); opacity:0; }
        40%     { transform: translate(0px,0px); opacity:1; }
        42.5%   { transform: translate(10px,-20px); opacity:1; }
        45%     { transform: translate(20px,0px); opacity:1; }
        47.5%   { transform: translate(30px,-20px); opacity:1; }
        50%     { transform: translate(40px,0px); opacity:1; }
        52.5%   { transform: translate(30px,-20px); opacity:1; }
        55%     { transform: translate(20px,0px); opacity:1; }
        57.5%   { transform: translate(10px,-20px); opacity:1; }
        60%     { transform: translate(0px,0px); opacity:1; }
        61%,100%{ transform: translate(0px,0px); opacity:0; }
      }

      /* ── Body tilt during play ── */
      @keyframes playBody {
        0%,39%  { transform: rotate(0deg); }
        40%     { transform: rotate(0deg); }
        45%     { transform: rotate(-8deg); }
        50%     { transform: rotate(0deg); }
        55%     { transform: rotate(-8deg); }
        60%     { transform: rotate(0deg); }
        61%,100%{ transform: rotate(0deg); }
      }

      /* ── Sleep phase: cat curls and eyes close ── */
      @keyframes sleepCurl {
        0%,59%  { transform: rotate(0deg) scaleX(1); }
        62%     { transform: rotate(5deg) scaleX(0.92); }
        65%,93% { transform: rotate(8deg) scaleX(0.9); }
        96%     { transform: rotate(5deg) scaleX(0.92); }
        100%    { transform: rotate(0deg) scaleX(1); }
      }

      /* ── Sleeping eye close ── */
      @keyframes eyeClose {
        0%,59%  { transform: scaleY(1); }
        63%,93% { transform: scaleY(0.1); }
        100%    { transform: scaleY(1); }
      }

      /* ── Zzz appear during sleep ── */
      @keyframes zzz1 {
        0%,59%        { opacity:0; transform: translate(0px,0px) scale(0.5); }
        63%           { opacity:1; transform: translate(0px,0px) scale(0.5); }
        70%           { opacity:1; transform: translate(4px,-12px) scale(1); }
        77%           { opacity:0; transform: translate(8px,-22px) scale(1.2); }
        100%          { opacity:0; transform: translate(0px,0px) scale(0.5); }
      }
      @keyframes zzz2 {
        0%,65%        { opacity:0; transform: translate(0px,0px) scale(0.5); }
        69%           { opacity:1; transform: translate(0px,0px) scale(0.5); }
        76%           { opacity:1; transform: translate(5px,-14px) scale(1.2); }
        83%           { opacity:0; transform: translate(10px,-26px) scale(1.5); }
        100%          { opacity:0; transform: translate(0px,0px) scale(0.5); }
      }
      @keyframes zzz3 {
        0%,71%        { opacity:0; transform: translate(0px,0px) scale(0.5); }
        75%           { opacity:1; transform: translate(0px,0px) scale(0.5); }
        82%           { opacity:1; transform: translate(6px,-18px) scale(1.5); }
        89%           { opacity:0; transform: translate(12px,-32px) scale(1.8); }
        100%          { opacity:0; transform: translate(0px,0px) scale(0.5); }
      }

      /* ── Cloud drift ── */
      @keyframes cloudDrift {
        0%   { transform: translateX(0px); }
        50%  { transform: translateX(30px); }
        100% { transform: translateX(0px); }
      }

      /* ── Apply animations ── */
      #catGroup {
        animation: walkPos 30s ease-in-out infinite,
                   bodyBob 30s ease-in-out infinite,
                   sleepCurl 30s ease-in-out infinite,
                   playBody 30s ease-in-out infinite;
      }
      #legFL { animation: legFront 30s ease-in-out infinite; }
      #legBL { animation: legBack  30s ease-in-out infinite; }
      #legFR { animation: legFront 30s ease-in-out infinite; }
      #legBR { animation: legBack  30s ease-in-out infinite; }
      #tail  { animation: tailWag  3s ease-in-out infinite; }
      #pawPlay { animation: pawBat 30s linear infinite; }
      #ball    { animation: ballBounce 30s linear infinite; }
      #eyeL    { animation: eyeClose 30s linear infinite; }
      #eyeR    { animation: eyeClose 30s linear infinite; }
      #zzz1    { animation: zzz1 30s linear infinite; }
      #zzz2    { animation: zzz2 30s linear infinite; }
      #zzz3    { animation: zzz3 30s linear infinite; }
      #cloud1  { animation: cloudDrift 20s ease-in-out infinite; }
      #cloud2  { animation: cloudDrift 26s ease-in-out infinite reverse; }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="800" height="260" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="700" cy="50" r="32" fill="#ffd166" opacity="0.9"/>
  <circle cx="700" cy="50" r="38" fill="#ffd166" opacity="0.3"/>

  <!-- Clouds -->
  <g id="cloud1">
    <ellipse cx="120" cy="45" rx="45" ry="18" fill="white" opacity="0.9"/>
    <ellipse cx="145" cy="35" rx="30" ry="18" fill="white" opacity="0.9"/>
    <ellipse cx="95" cy="38" rx="25" ry="14" fill="white" opacity="0.9"/>
  </g>
  <g id="cloud2">
    <ellipse cx="400" cy="32" rx="38" ry="14" fill="white" opacity="0.85"/>
    <ellipse cx="420" cy="22" rx="24" ry="14" fill="white" opacity="0.85"/>
    <ellipse cx="380" cy="25" rx="20" ry="12" fill="white" opacity="0.85"/>
  </g>

  <!-- Grass hill far -->
  <ellipse cx="150" cy="230" rx="200" ry="40" fill="#74c69d" opacity="0.5"/>
  <ellipse cx="650" cy="240" rx="180" ry="35" fill="#74c69d" opacity="0.4"/>

  <!-- Ground / grass strip -->
  <rect x="0" y="205" width="800" height="55" fill="url(#grassGrad)"/>

  <!-- Grass blades (decorative) -->
  <g fill="#40916c" opacity="0.8">
    <polygon points="30,205 34,185 38,205"/>
    <polygon points="55,205 59,190 63,205"/>
    <polygon points="80,205 84,188 88,205"/>
    <polygon points="200,205 204,187 208,205"/>
    <polygon points="230,205 234,192 238,205"/>
    <polygon points="370,205 374,186 378,205"/>
    <polygon points="430,205 434,190 438,205"/>
    <polygon points="510,205 514,188 518,205"/>
    <polygon points="560,205 564,192 568,205"/>
    <polygon points="620,205 624,187 628,205"/>
    <polygon points="660,205 664,190 668,205"/>
    <polygon points="720,205 724,186 728,205"/>
    <polygon points="760,205 764,188 768,205"/>
  </g>

  <!-- ══ HOUSE ══ -->
  <!-- House body -->
  <rect x="570" y="115" width="160" height="90" fill="#f4e5c2" rx="2"/>
  <!-- Roof -->
  <polygon points="558,115 650,55 742,115" fill="url(#roofGrad)"/>
  <!-- Chimney -->
  <rect x="690" y="63" width="18" height="36" fill="#c77d5c"/>
  <rect x="686" y="60" width="26" height="8" fill="#b56543"/>
  <!-- Smoke from chimney -->
  <circle cx="699" cy="52" r="5" fill="#ccc" opacity="0.5">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-3,-12;-5,-24" dur="3s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.5;0.3;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;7;9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="699" cy="52" r="4" fill="#ddd" opacity="0.4">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;2,-10;4,-20" dur="3s" begin="1s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.4;0.2;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;8" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Door -->
  <rect x="630" y="155" width="38" height="50" fill="#c77d5c" rx="3"/>
  <rect x="630" y="155" width="38" height="50" fill="none" stroke="#a0522d" stroke-width="2" rx="3"/>
  <circle cx="663" cy="181" r="3" fill="#ffd166"/>
  <!-- Windows -->
  <rect x="582" y="134" width="34" height="30" fill="#a8dadc" rx="3"/>
  <line x1="599" y1="134" x2="599" y2="164" stroke="white" stroke-width="1.5"/>
  <line x1="582" y1="149" x2="616" y2="149" stroke="white" stroke-width="1.5"/>
  <rect x="684" y="134" width="34" height="30" fill="#a8dadc" rx="3"/>
  <line x1="701" y1="134" x2="701" y2="164" stroke="white" stroke-width="1.5"/>
  <line x1="684" y1="149" x2="718" y2="149" stroke="white" stroke-width="1.5"/>
  <!-- Window frames -->
  <rect x="582" y="134" width="34" height="30" fill="none" stroke="#a0522d" stroke-width="2" rx="3"/>
  <rect x="684" y="134" width="34" height="30" fill="none" stroke="#a0522d" stroke-width="2" rx="3"/>
  <!-- Fence -->
  <g stroke="#d4a574" stroke-width="2" fill="#e8c99a">
    <rect x="540" y="185" width="8" height="30" rx="1"/>
    <rect x="555" y="185" width="8" height="30" rx="1"/>
    <line x1="538" y1="193" x2="565" y2="193" stroke-width="2.5"/>
    <rect x="740" y="185" width="8" height="30" rx="1"/>
    <rect x="755" y="185" width="8" height="30" rx="1"/>
    <line x1="738" y1="193" x2="765" y2="193" stroke-width="2.5"/>
  </g>

  <!-- ══ CAT ══ (base position: cat sits near x=80, y=205) -->
  <g id="catGroup" transform="translate(80,0)">

    <!-- Tail (behind body) -->
    <g id="tail" transform="translate(48,180)">
      <path d="M0,0 Q-20,-30 -10,-55 Q0,-75 10,-60"
            fill="none" stroke="#d97706" stroke-width="7" stroke-linecap="round"/>
      <!-- Tail tip -->
      <circle cx="10" cy="-60" r="6" fill="#fbbf24"/>
    </g>

    <!-- Back legs -->
    <g id="legBL" transform="translate(38,192)">
      <rect x="-5" y="0" width="10" height="20" fill="#d97706" rx="3"/>
      <ellipse cx="0" cy="20" rx="8" ry="4" fill="#b45309"/>
    </g>
    <g id="legBR" transform="translate(48,192)">
      <rect x="-5" y="0" width="10" height="20" fill="#d97706" rx="3"/>
      <ellipse cx="0" cy="20" rx="8" ry="4" fill="#b45309"/>
    </g>

    <!-- Body -->
    <ellipse cx="50" cy="185" rx="32" ry="22" fill="#f59e0b"/>
    <!-- Tabby stripes on body -->
    <path d="M25,175 Q35,170 45,175" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M28,183 Q40,178 52,183" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M55,175 Q65,170 75,175" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M58,183 Q68,178 78,182" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Belly (lighter) -->
    <ellipse cx="50" cy="190" rx="18" ry="13" fill="#fde68a" opacity="0.7"/>

    <!-- Front legs (in front of body) -->
    <g id="legFL" transform="translate(30,193)">
      <rect x="-5" y="0" width="10" height="18" fill="#f59e0b" rx="3"/>
      <ellipse cx="0" cy="18" rx="8" ry="4" fill="#d97706"/>
    </g>
    <g id="legFR" transform="translate(68,193)">
      <rect x="-5" y="0" width="10" height="18" fill="#f59e0b" rx="3"/>
      <ellipse cx="0" cy="18" rx="8" ry="4" fill="#d97706"/>
    </g>

    <!-- Play paw (raised, only visible during play) -->
    <g id="pawPlay">
      <rect x="13" y="175" width="10" height="20" fill="#f59e0b" rx="3"/>
      <ellipse cx="18" cy="172" rx="9" ry="5" fill="#d97706"/>
    </g>

    <!-- Neck -->
    <rect x="42" y="162" width="16" height="14" fill="#f59e0b" rx="5"/>

    <!-- Head -->
    <circle cx="50" cy="155" r="22" fill="#f59e0b"/>
    <!-- Head stripes -->
    <path d="M38,145 Q50,140 62,145" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M36,151 Q50,146 64,151" stroke="#92400e" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Ears -->
    <polygon points="32,140 28,120 44,135" fill="#f59e0b"/>
    <polygon points="35,137 32,122 43,134" fill="#fca5a5" opacity="0.7"/>
    <polygon points="68,140 72,120 56,135" fill="#f59e0b"/>
    <polygon points="65,137 68,122 57,134" fill="#fca5a5" opacity="0.7"/>

    <!-- Eyes -->
    <g id="eyeL">
      <ellipse cx="42" cy="153" rx="5" ry="5.5" fill="#1a1a2e"/>
      <circle cx="43.5" cy="151.5" r="1.5" fill="white"/>
      <ellipse cx="42" cy="153" rx="5" ry="5.5" fill="none" stroke="#92400e" stroke-width="0.8"/>
    </g>
    <g id="eyeR">
      <ellipse cx="58" cy="153" rx="5" ry="5.5" fill="#1a1a2e"/>
      <circle cx="59.5" cy="151.5" r="1.5" fill="white"/>
      <ellipse cx="58" cy="153" rx="5" ry="5.5" fill="none" stroke="#92400e" stroke-width="0.8"/>
    </g>

    <!-- Nose -->
    <polygon points="50,160 47,157 53,157" fill="#f472b6"/>
    <!-- Mouth -->
    <path d="M47,161 Q50,164 53,161" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Whiskers -->
    <line x1="20" y1="157" x2="43" y2="159" stroke="#d1d5db" stroke-width="1.2"/>
    <line x1="20" y1="161" x2="43" y2="161" stroke="#d1d5db" stroke-width="1.2"/>
    <line x1="57" y1="159" x2="80" y2="157" stroke="#d1d5db" stroke-width="1.2"/>
    <line x1="57" y1="161" x2="80" y2="161" stroke="#d1d5db" stroke-width="1.2"/>

    <!-- Ball (only visible during play) -->
    <g id="ball" transform="translate(60,188)">
      <circle cx="0" cy="0" r="8" fill="#ef4444"/>
      <path d="M-5,-6 Q0,-8 5,-6" fill="none" stroke="#dc2626" stroke-width="1.5"/>
      <path d="M-7,-1 Q0,2 7,-1" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    </g>

    <!-- Zzz (only visible during sleep) -->
    <text id="zzz1" x="68" y="148" font-size="12" font-family="Arial" font-weight="bold"
          fill="#60a5fa" opacity="0">z</text>
    <text id="zzz2" x="72" y="140" font-size="15" font-family="Arial" font-weight="bold"
          fill="#3b82f6" opacity="0">z</text>
    <text id="zzz3" x="76" y="130" font-size="18" font-family="Arial" font-weight="bold"
          fill="#2563eb" opacity="0">Z</text>

  </g><!-- end #catGroup -->

  <!-- Foreground grass detail -->
  <g fill="#2d6a4f" opacity="0.6">
    <polygon points="0,260 0,230 5,210 10,230 10,260"/>
    <polygon points="15,260 15,235 20,218 25,235 25,260"/>
    <polygon points="790,260 790,228 795,210 800,228 800,260"/>
    <polygon points="775,260 775,234 780,216 785,234 785,260"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="205" x2="800" y2="205" stroke="#1b4332" stroke-width="1" opacity="0.4"/>
</svg>
