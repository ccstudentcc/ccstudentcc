<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Hero glow background animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49" />
      <stop offset="50%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#1d4ed8" />
      <animate attributeName="x1" values="0;1;0" dur="18s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1;0;1" dur="18s" repeatCount="indefinite" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; letter-spacing: 0.6px; }
      .subtitle { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1200" height="220" rx="28" fill="url(#bg)" />

  <circle cx="320" cy="60" r="180" fill="url(#glow1)" filter="url(#soft)">
    <animate attributeName="cx" values="280;380;280" dur="12s" repeatCount="indefinite" />
    <animate attributeName="cy" values="70;48;70" dur="12s" repeatCount="indefinite" />
  </circle>

  <circle cx="860" cy="164" r="190" fill="url(#glow2)" filter="url(#soft)">
    <animate attributeName="cx" values="900;780;900" dur="14s" repeatCount="indefinite" />
    <animate attributeName="cy" values="150;176;150" dur="14s" repeatCount="indefinite" />
  </circle>

  <text x="48" y="98" class="title">Designing Code Like Products</text>
  <text x="50" y="132" class="subtitle">Modern  |  Dynamic  |  Interactive</text>
</svg>
