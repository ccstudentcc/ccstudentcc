name: README Worker - WakaTime

run-name: WakaTime | ${{ github.event_name }}

on:
  workflow_call:
    secrets:
      WAKATIME_API_KEY:
        required: true
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-worker-wakatime
  cancel-in-progress: false

jobs:
  update-readme:
    uses: ./.github/workflows/_managed-readme-worker.yml
    with:
      job_name: Update WakaTime Stats
      timeout_minutes: 10
      execution_mode: python
      command: python .github/scripts/update_wakatime.py
      summary_label: WakaTime
      commit_message: 'chore(readme): update wakatime stats'
      commit_scope: README.md
      setup_python: true
      required_secrets: WAKATIME_API_KEY
    secrets:
      wakatime_api_key: ${{ secrets.WAKATIME_API_KEY }}
