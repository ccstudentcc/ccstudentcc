name: README Workflow Manager

run-name: README Manager | ${{ github.event_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,16 * * *'

concurrency:
  group: workflow-manager
  cancel-in-progress: false

jobs:
  orchestrate:
    name: Orchestrate README Automation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ensure featured projects script is executable
        run: chmod +x .github/scripts/update_featured_projects.sh

      - name: Validate workflow chain coverage
        run: python .github/scripts/validate_workflow_chain.py

      - name: Run workflow controller
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # Enable write-batching to reduce persistence IO for manager runs
          WORKFLOW_WRITE_BATCHING: true
        run: python .github/scripts/workflow_controller.py

      - name: Validate workflow chain post-run
        run: python .github/scripts/validate_workflow_chain.py

      - name: Commit manager state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): update workflow manager state"
          file_pattern: README.md assets/showcase-carousel.svg .github/manager/state/*.json