name: README Worker - Featured Projects

run-name: Featured Projects | ${{ github.event_name }}

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: readme-worker-featured-projects
  cancel-in-progress: false

jobs:
  update-featured-projects:
    uses: ./.github/workflows/_managed-readme-worker.yml
    with:
      job_name: Refresh Featured Projects
      timeout_minutes: 10
      execution_mode: bash
      command: .github/scripts/update_featured_projects.sh
      summary_label: Featured Projects
      commit_message: 'chore(readme): refresh featured projects'
      commit_scope: README.md
      chmod_target: .github/scripts/update_featured_projects.sh
      required_secrets: GITHUB_TOKEN
    secrets:
      repo_token: ${{ secrets.GITHUB_TOKEN }}
