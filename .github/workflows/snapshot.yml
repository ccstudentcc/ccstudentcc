name: Snapshot

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: readme-worker-snapshot
  cancel-in-progress: false

jobs:
  update-snapshot:
    name: Refresh Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update recent repositories snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_snapshot.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): refresh snapshot"
          file_pattern: README.md