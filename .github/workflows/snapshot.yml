name: Snapshot

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: true
  workflow_dispatch:

concurrency:
  group: readme-worker-snapshot
  cancel-in-progress: false

jobs:
  update-snapshot:
    uses: ./.github/workflows/_managed-readme-worker.yml
    with:
      job_name: Refresh Snapshot
      timeout_minutes: 5
      execution_mode: python
      command: python .github/scripts/update_snapshot.py
      summary_label: Snapshot
      commit_message: 'chore(readme): refresh snapshot'
      commit_scope: README.md assets/showcase-carousel.svg
      setup_python: true
      required_secrets: GITHUB_TOKEN
    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}