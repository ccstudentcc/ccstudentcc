name: Daily Quote

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: readme-worker-daily-quote
  cancel-in-progress: false

jobs:
  update-daily-quote:
    uses: ./.github/workflows/_managed-readme-worker.yml
    with:
      job_name: Refresh Daily Quote
      timeout_minutes: 5
      execution_mode: python
      command: python .github/scripts/update_daily_quote.py
      summary_label: Daily Quote
      commit_message: 'chore(readme): refresh daily quote'
      commit_scope: README.md
      setup_python: true
      required_secrets: 'None'
