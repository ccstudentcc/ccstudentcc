name: Daily Quote

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: readme-worker-daily-quote
  cancel-in-progress: false

jobs:
  update-daily-quote:
    name: Refresh Daily Quote
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update quote section
        run: python .github/scripts/update_daily_quote.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): refresh daily quote"
          file_pattern: README.md